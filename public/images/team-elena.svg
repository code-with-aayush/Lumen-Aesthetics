<!--
  Team placeholder — editorial silhouette for Dr. Elena Vasquez.

  Same warm-grey-on-dark vocabulary as /images/hero-portrait.svg so the
  experience page feels cohesive with the homepage. 3:4 portrait aspect.

  TODO(C5): swap for a real editorial headshot per PRD §12.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" role="img" aria-label="Editorial portrait placeholder">
  <rect width="300" height="400" fill="#1A1A1A" />
  <defs>
    <radialGradient id="g" cx="50%" cy="38%" r="60%">
      <stop offset="0%" stop-color="#3A3328" stop-opacity="0.55" />
      <stop offset="100%" stop-color="#1A1A1A" stop-opacity="0" />
    </radialGradient>
  </defs>
  <rect width="300" height="400" fill="url(#g)" />
  <!-- hair: longer silhouette flowing past shoulders -->
  <path d="M 92 180 Q 80 240 88 310 Q 150 290 212 310 Q 220 240 208 180 Q 200 130 150 120 Q 100 130 92 180 Z" fill="#2E2924" opacity="0.9" />
  <!-- head -->
  <ellipse cx="150" cy="158" rx="54" ry="62" fill="#4A453E" opacity="0.85" />
  <!-- neck -->
  <rect x="134" y="208" width="32" height="28" fill="#3A3530" opacity="0.85" />
  <!-- shoulders -->
  <path d="M 60 400 Q 60 270 150 260 Q 240 270 240 400 Z" fill="#3A3530" opacity="0.85" />
  <!-- soft highlight on cheek -->
  <ellipse cx="138" cy="146" rx="20" ry="30" fill="#5A554D" opacity="0.3" />
</svg>
