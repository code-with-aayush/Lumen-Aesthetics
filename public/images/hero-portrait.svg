<!--
  Hero portrait placeholder — editorial silhouette in muted warm tones,
  intentionally abstract so a real Unsplash portrait can swap in at C5
  polish without the layout shifting. The image area is dark (#1A1A1A) on
  the canvas, and the figure is a single warm-grey shape so it reads as
  "portrait of a person" without claiming to depict anyone specific.

  Aspect 3:4 (portrait orientation) matches the PRD §5.1 brief for the
  hero right column. The gold frame is drawn in CSS on the Hero
  component, not in the SVG, so it can be re-themed without touching
  this file.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" role="img" aria-label="Editorial portrait placeholder">
  <rect width="300" height="400" fill="#1A1A1A" />
  <!-- soft warm glow behind the figure -->
  <defs>
    <radialGradient id="g" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#3A3328" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#1A1A1A" stop-opacity="0" />
    </radialGradient>
  </defs>
  <rect width="300" height="400" fill="url(#g)" />
  <!-- figure: head + shoulders, single warm-grey shape -->
  <ellipse cx="150" cy="160" rx="58" ry="68" fill="#4A453E" opacity="0.7" />
  <path d="M 70 400 Q 70 280 150 280 Q 230 280 230 400 Z" fill="#3A3530" opacity="0.85" />
  <!-- subtle highlight on the figure to suggest light direction -->
  <ellipse cx="138" cy="148" rx="22" ry="32" fill="#5A554D" opacity="0.35" />
</svg>
