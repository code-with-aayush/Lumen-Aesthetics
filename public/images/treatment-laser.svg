<!--
  Laser Resurfacing placeholder — abstract horizontal light beam crossing a
  dark canvas. Evokes the fractional laser pass without depicting clinical
  hardware. Real photography lands in C5.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" role="img" aria-label="Laser Resurfacing treatment placeholder">
  <defs>
    <linearGradient id="laser-beam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#B8974A" stop-opacity="0" />
      <stop offset="50%" stop-color="#B8974A" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#B8974A" stop-opacity="0" />
    </linearGradient>
    <radialGradient id="laser-glow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#3A3328" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#0F0E0C" stop-opacity="0" />
    </radialGradient>
  </defs>
  <rect width="600" height="800" fill="#1A1A1A" />
  <rect width="600" height="800" fill="url(#laser-glow)" />
  <!-- the beam itself -->
  <rect x="0" y="396" width="600" height="8" fill="url(#laser-beam)" />
  <rect x="0" y="392" width="600" height="2" fill="#B8974A" opacity="0.25" />
  <!-- implied grid of fractional passes -->
  <line x1="0" y1="500" x2="600" y2="500" stroke="#2A2520" stroke-width="1" opacity="0.6" />
  <line x1="0" y1="300" x2="600" y2="300" stroke="#2A2520" stroke-width="1" opacity="0.6" />
  <circle cx="150" cy="400" r="2" fill="#B8974A" opacity="0.5" />
  <circle cx="300" cy="400" r="2" fill="#B8974A" opacity="0.5" />
  <circle cx="450" cy="400" r="2" fill="#B8974A" opacity="0.5" />
</svg>