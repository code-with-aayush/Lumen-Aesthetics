<!--
  RF Microneedling placeholder — abstract dot grid suggesting a matrix of
  micro-channels with a soft gold pulse radiating outward. Evokes the
  controlled injury-and-response pattern of RF microneedling without
  depicting clinical hardware. Real photography lands in C5.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" role="img" aria-label="RF Microneedling treatment placeholder">
  <defs>
    <radialGradient id="rf-pulse" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#B8974A" stop-opacity="0.35" />
      <stop offset="60%" stop-color="#3A3328" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#0F0E0C" stop-opacity="0" />
    </radialGradient>
  </defs>
  <rect width="600" height="800" fill="#1A1A1A" />
  <circle cx="300" cy="400" r="280" fill="url(#rf-pulse)" />
  <!-- micro-needle matrix: 9 rows x 9 cols, subtle dots -->
  <g fill="#5A554D" opacity="0.55">
    <!-- centered matrix 240 wide centered at x=300, y=280..520 -->
    <circle cx="180" cy="320" r="2" />
    <circle cx="240" cy="320" r="2" />
    <circle cx="300" cy="320" r="2" />
    <circle cx="360" cy="320" r="2" />
    <circle cx="420" cy="320" r="2" />
    <circle cx="180" cy="380" r="2" />
    <circle cx="240" cy="380" r="2" />
    <circle cx="300" cy="380" r="2" />
    <circle cx="360" cy="380" r="2" />
    <circle cx="420" cy="380" r="2" />
    <circle cx="180" cy="440" r="2" />
    <circle cx="240" cy="440" r="2" />
    <circle cx="300" cy="440" r="2" />
    <circle cx="360" cy="440" r="2" />
    <circle cx="420" cy="440" r="2" />
    <circle cx="180" cy="500" r="2" />
    <circle cx="240" cy="500" r="2" />
    <circle cx="300" cy="500" r="2" />
    <circle cx="360" cy="500" r="2" />
    <circle cx="420" cy="500" r="2" />
  </g>
  <!-- three highlighted dots in gold — the "active" RF points -->
  <circle cx="240" cy="380" r="3" fill="#B8974A" opacity="0.7" />
  <circle cx="300" cy="440" r="3" fill="#B8974A" opacity="0.7" />
  <circle cx="360" cy="380" r="3" fill="#B8974A" opacity="0.7" />
</svg>